<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Botonera Futurista</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Orbitron', sans-serif;
}

body {
  height: 100vh;
  overflow: hidden;
  background: radial-gradient(circle at top, #0b0f1a, #000);
  display: flex;
  justify-content: center;
  align-items: center;
  color: #00f7ff;
}

/* fondo grid */
body::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background-image:
    linear-gradient(rgba(0,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,255,0.05) 1px, transparent 1px);
  background-size: 50px 50px;
  animation: moveGrid 10s linear infinite;
  transform: rotate(20deg);
}

@keyframes moveGrid {
  from { transform: translateY(0) rotate(20deg); }
  to { transform: translateY(-50px) rotate(20deg); }
}

.container {
  position: relative;
  z-index: 2;
  width: 90%;
  max-width: 400px;
  padding: 20px;
  background: rgba(0, 255, 255, 0.05);
  border: 1px solid rgba(0, 255, 255, 0.2);
  border-radius: 20px;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 25px rgba(0,255,255,0.2);
  text-align: center;
  animation: float 4s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
}

h1 {
  font-size: 18px;
  margin-bottom: 20px;
  letter-spacing: 2px;
  text-shadow: 0 0 10px #00f7ff;
}

.btn {
  width: 100%;
  padding: 15px;
  margin: 10px 0;
  border: none;
  border-radius: 12px;
  background: linear-gradient(90deg, #00f7ff, #0066ff);
  color: black;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 0 15px rgba(0,255,255,0.3);
}

.btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px rgba(0,255,255,0.8);
}

.footer {
  margin-top: 15px;
  font-size: 10px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="container">
  <h1>⚡ SEXTO "A" | MODO ROBOT ⚡</h1>

  <button class="btn" onclick="accion('1')">JUEGO 1</button>
  <button class="btn" onclick="accion('2')">JUEGO 2</button>
  <button class="btn" onclick="accion('3')">PABLO</button>

  <div class="footer">
    INTERFACE v3.0 • NEURAL LINK ACTIVE
  </div>
</div>

<script>

let currentAudio = null;

function accion(id){

  // 🔇 detener audio anterior si existe
  if(currentAudio){
    currentAudio.pause();
    currentAudio.currentTime = 0;
  }

  // 🎧 asignar nuevo audio
  if(id === '1'){
    currentAudio = new Audio('1.mp3');
  }

  if(id === '2'){
    currentAudio = new Audio('2.mp3');
  }

  if(id === '3'){
    currentAudio = new Audio('Hola soy Pablo el ro (1).mp3');
  }

  // ▶️ reproducir
  if(currentAudio){
    currentAudio.play().catch(err => {
      console.log("Error audio:", err);
    });
  }

  console.log("Ejecutado:", id);
}

</script>

</body>
</html>
