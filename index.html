<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Botonera</title>

<style>

body{
    margin:0;
    background:#1f1f1f;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.contenedor{
    width:90%;
    max-width:450px;
}

button{
    width:100%;
    height:90px;
    margin:15px 0;
    border:none;
    border-radius:18px;
    color:white;
    font-size:30px;
    font-weight:bold;
    cursor:pointer;
    transition:.2s;
}

button:active{
    transform:scale(.97);
}

#pablo{
    background:#d32f2f;
}

#uno{
    background:#1976d2;
}

#dos{
    background:#388e3c;
}

</style>

</head>

<body>

<div class="contenedor">

<button id="pablo">🤖 COMIENZO ROBÓTICO</button>

<button id="uno">1️⃣ UNO</button>

<button id="dos">2️⃣ DOS</button>

</div>

<audio id="aPablo" src="Hola%20soy%20Pablo%20el%20ro%20(1).mp3"></audio>
<audio id="aUno" src="1.mp3"></audio>
<audio id="aDos" src="2.mp3"></audio>

<script>

const audios=[
document.getElementById("aPablo"),
document.getElementById("aUno"),
document.getElementById("aDos")
];

function detener(){

audios.forEach(a=>{
a.pause();
a.currentTime=0;
});

}

document.getElementById("pablo").onclick=()=>{

detener();
document.getElementById("aPablo").play();

}

document.getElementById("uno").onclick=()=>{

detener();
document.getElementById("aUno").play();

}

document.getElementById("dos").onclick=()=>{

detener();
document.getElementById("aDos").play();

}

</script>

</body>
</html>
